<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload de Manuais</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }
    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      color: white;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { font-size: 0.85rem; opacity: 0.5; margin-bottom: 28px; }
    label { font-size: 0.85rem; opacity: 0.7; display: block; margin-bottom: 6px; }
    input[type="password"], input[type="file"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: white;
      font-size: 0.9rem;
      margin-bottom: 20px;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    input[type="file"] { cursor: pointer; }
    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .resultado {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }
    .resultado.sucesso { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); }
    .resultado.erro { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); }
  </style>
</head>
<body>
<div class="container">
  <h1>📤 Upload de Manuais</h1>
  <p>Envie PDFs para a base de conhecimento do assistente</p>
  <label>Senha de administrador</label>
  <input type="password" id="senha" placeholder="Digite a senha..." />
  <label>Arquivos PDF</label>
  <input type="file" id="arquivos" accept=".pdf" multiple />
  <button id="btn" onclick="enviar()">Enviar Manuais</button>
  <div class="resultado" id="resultado"></div>
</div>
<script>
  async function enviar() {
    const senha = document.getElementById('senha').value;
    const arquivos = document.getElementById('arquivos').files;
    const btn = document.getElementById('btn');
    const resultado = document.getElementById('resultado');
    if (!senha) { alert('Digite a senha!'); return; }
    if (arquivos.length === 0) { alert('Selecione pelo menos um PDF!'); return; }
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    const formData = new FormData();
    formData.append('senha', senha);
    for (const arquivo of arquivos) formData.append('pdfs', arquivo);
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const dados = await res.json();
      resultado.style.display = 'block';
      resultado.className = 'resultado ' + (dados.sucesso ? 'sucesso' : 'erro');
      resultado.textContent = dados.mensagem;
    } catch {
      resultado.style.display = 'block';
      resultado.className = 'resultado erro';
      resultado.textContent = '❌ Erro ao conectar com o servidor.';
    }
    btn.disabled = false;
    btn.textContent = 'Enviar Manuais';
  }
</script>
</body>
</html>
