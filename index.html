<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suporte N1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      position: relative;
      overflow: hidden;
    }

    /* Partículas de fundo */
    body::before {
      content: '';
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      top: -100px; left: -100px;
      border-radius: 50%;
      animation: flutuar 8s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(168,85,247,0.12) 0%, transparent 70%);
      bottom: -100px; right: -100px;
      border-radius: 50%;
      animation: flutuar 10s ease-in-out infinite reverse;
    }

    @keyframes flutuar {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    .container {
      width: 100%;
      max-width: 820px;
      height: 92vh;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .cabecalho {
      padding: 22px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(168,85,247,0.2));
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .cabecalho::after {
      content: '';
      position: absolute;
      bottom: 0; left: 28px; right: 28px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(99,102,241,0.8), transparent);
    }

    .avatar-bot {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    .cabecalho-info h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.3px;
    }

    .cabecalho-info p {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .indicador {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
    }

    .ponto-online {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px #22c55e;
      animation: piscar 2s infinite;
    }

    @keyframes piscar {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status {
      padding: 8px 28px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      background: rgba(99,102,241,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: rgba(99,102,241,0.3) transparent;
    }

    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }

    .mensagem {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 88%;
      animation: entrar 0.3s ease;
    }

    @keyframes entrar {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mensagem.usuario {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }

    .mensagem.bot .msg-avatar {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }

    .mensagem.usuario .msg-avatar {
      background: linear-gradient(135deg, #0ea5e9, #06b6d4);
      box-shadow: 0 4px 12px rgba(14,165,233,0.3);
    }

    .balao {
      padding: 13px 18px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .mensagem.bot .balao {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.9);
      border-top-left-radius: 4px;
    }

    .mensagem.usuario .balao {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border-top-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }

    .digitando {
      display: flex; gap: 5px;
      padding: 16px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      border-top-left-radius: 4px;
      width: fit-content;
    }

    .digitando span {
      width: 7px; height: 7px;
      background: rgba(99,102,241,0.8);
      border-radius: 50%;
      animation: pulsar 1.2s infinite;
    }

    .digitando span:nth-child(2) { animation-delay: 0.2s; }
    .digitando span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulsar {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .rodape {
      padding: 18px 28px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; gap: 10px;
      background: rgba(0,0,0,0.2);
    }

    .rodape input {
      flex: 1;
      padding: 13px 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: white;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s, background 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .rodape input::placeholder { color: rgba(255,255,255,0.3); }
    .rodape input:focus {
      border-color: rgba(99,102,241,0.6);
      background: rgba(99,102,241,0.08);
    }

    .rodape button {
      padding: 13px 22px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 15px rgba(99,102,241,0.4);
    }

    .rodape button:hover { opacity: 0.9; transform: translateY(-1px); }
    .rodape button:active { transform: translateY(0); }
    .rodape button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  </style>
</head>
<body>
<div class="container">
  <div class="cabecalho">
    <div class="avatar-bot">🤖</div>
    <div class="cabecalho-info">
      <h1>Assistente de Suporte N1</h1>
      <p>Powered by IA — Baseado nos manuais internos</p>
    </div>
    <div class="indicador">
      <div class="ponto-online"></div>
      <span id="indicador-txt">Conectando...</span>
    </div>
  </div>

  <div class="status" id="status">⏳ Carregando manuais...</div>

  <div class="chat" id="chat">
    <div class="mensagem bot">
      <div class="msg-avatar">🤖</div>
      <div class="balao">Olá! Sou o assistente de suporte N1. Pode me perguntar qualquer coisa sobre os manuais disponíveis. Como posso te ajudar?</div>
    </div>
  </div>

  <div class="rodape">
    <input type="text" id="input" placeholder="Digite sua pergunta..." />
    <button id="btn" onclick="enviar()">Enviar ➤</button>
  </div>
</div>

<script>
  fetch('/status')
    .then(r => r.json())
    .then(d => {
      document.getElementById('status').textContent = `📚 ${d.manuais} manuais carregados e prontos`;
      document.getElementById('indicador-txt').textContent = 'Online';
    })
    .catch(() => {
      document.getElementById('status').textContent = '❌ Servidor offline';
      document.getElementById('indicador-txt').textContent = 'Offline';
    });

  function adicionarMensagem(texto, tipo) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `mensagem ${tipo}`;
    div.innerHTML = `<div class="msg-avatar">${tipo === 'bot' ? '🤖' : '👤'}</div><div class="balao">${texto}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function mostrarDigitando() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'mensagem bot';
    div.id = 'digitando';
    div.innerHTML = `<div class="msg-avatar">🤖</div><div class="digitando"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removerDigitando() {
    const el = document.getElementById('digitando');
    if (el) el.remove();
  }

  async function enviar() {
    const input = document.getElementById('input');
    const btn = document.getElementById('btn');
    const pergunta = input.value.trim();
    if (!pergunta) return;
    adicionarMensagem(pergunta, 'usuario');
    input.value = '';
    btn.disabled = true;
    mostrarDigitando();
    try {
      const res = await fetch('/perguntar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pergunta })
      });
      const dados = await res.json();
      removerDigitando();
      adicionarMensagem(dados.resposta, 'bot');
    } catch {
      removerDigitando();
      adicionarMensagem('❌ Erro ao conectar com o servidor.', 'bot');
    }
    btn.disabled = false;
    input.focus();
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') enviar();
  });
</script>
</body>
</html>
